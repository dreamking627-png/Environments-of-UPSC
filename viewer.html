<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रश्न दर्शक - पर्यावरण एवं पारिस्थितिकी</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #f5f7fa; --card-bg: #ffffff; --text: #1e293b; --text-secondary: #475569; --border: #cbd5e1; --primary: #2d6a4f; --btn-image: #16a34a; --btn-bookmark: #ff9800; --btn-mock: #9c27b0; --header-bg: #0f3b2c; --analysis-bg: #fef9e3; --analysis-text: #92400e; --option-hover: #e2e8f0; }
        body.dark-mode { --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --text-secondary: #cbd5e1; --border: #334155; --primary: #4ade80; --btn-image: #22c55e; --btn-bookmark: #f97316; --btn-mock: #c084fc; --header-bg: #020617; --analysis-bg: #422006; --analysis-text: #fed7aa; --option-hover: #334155; }
        body { font-family: 'Segoe UI', 'Noto Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; line-height: 1.5; }
        .header { background: var(--header-bg); color: white; padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1rem; }
        .header-left { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .user-info { display: flex; align-items: center; gap: 0.8rem; background: rgba(255,255,255,0.15); padding: 0.3rem 0.8rem; border-radius: 2rem; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .user-name { font-size: 0.8rem; font-weight: 500; }
        .google-btn { background: white; color: #1e293b; border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; cursor: pointer; font-size: 0.75rem; font-weight: 500; display: flex; align-items: center; gap: 0.3rem; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; cursor: pointer; font-size: 0.75rem; font-weight: 500; }
        .back-link { background: var(--primary); color: #0f172a; padding: 0.3rem 0.8rem; border-radius: 2rem; text-decoration: none; font-weight: 500; font-size: 0.75rem; }
        .dark-toggle { background: var(--primary); border: none; width: 2rem; height: 2rem; border-radius: 50%; cursor: pointer; font-size: 1rem; }
        
        /* Login Popup */
        .login-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-popup.hidden { display: none; }
        .login-popup-content { background: var(--card-bg); border-radius: 1rem; padding: 2rem; text-align: center; max-width: 350px; width: 90%; position: relative; }
        .close-modal-btn { position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); }
        .google-signin-btn { background: #4285F4; color: white; border: none; padding: 0.8rem 1rem; border-radius: 2rem; cursor: pointer; font-size: 1rem; width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .skip-login-btn { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); padding: 0.6rem 1rem; border-radius: 2rem; cursor: pointer; margin-top: 1rem; width: 100%; }
        
        .container { max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem; }
        .top-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
        .mock-test-btn { background: var(--btn-mock); color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; cursor: pointer; font-size: 0.75rem; }
        .info-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; gap: 1rem; }
        .part-selector { display: flex; align-items: center; gap: 0.5rem; background: var(--card-bg); padding: 0.3rem 0.8rem; border-radius: 2rem; border: 1px solid var(--border); }
        .part-selector select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 1rem; padding: 0.3rem 0.6rem; cursor: pointer; }
        .search-box { flex: 1; min-width: 200px; }
        .search-input { width: 100%; padding: 0.5rem 0.8rem; border: 1px solid var(--border); border-radius: 2rem; background: var(--card-bg); color: var(--text); }
        .question-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 1.2rem; margin-bottom: 1.2rem; position: relative; }
        .bookmarked { border-left: 4px solid var(--btn-bookmark); }
        .question-text { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .question-meta { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .options { margin: 0.8rem 0; }
        .option { margin: 0.4rem 0; padding: 0.4rem 0.8rem; background: var(--bg); border-radius: 0.5rem; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
        .option:hover { background: var(--option-hover); }
        .option.correct-highlight { background: #22c55e !important; color: white; }
        .option.wrong-highlight { background: #ef4444 !important; color: white; }
        body.dark-mode .option.correct-highlight { background: #15803d !important; }
        body.dark-mode .option.wrong-highlight { background: #b91c1c !important; }
        .analysis-box { margin-top: 0.8rem; padding: 0.8rem; background: var(--analysis-bg); color: var(--analysis-text); border-radius: 0.5rem; border-left: 4px solid var(--primary); display: none; font-size: 0.9rem; line-height: 1.5; }
        .btn-group { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.8rem; }
        .btn-image, .btn-bookmark { border: none; padding: 0.3rem 0.9rem; border-radius: 2rem; cursor: pointer; font-size: 0.75rem; }
        .btn-image { background: var(--btn-image); color: white; }
        .btn-bookmark { background: var(--btn-bookmark); color: white; }
        .btn-bookmark.active { background: #ff5722; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); border-radius: 1rem; padding: 1.5rem; max-width: 90%; width: 400px; text-align: center; }
        .modal-content button { margin: 0.5rem; padding: 0.5rem 1rem; border-radius: 2rem; border: none; cursor: pointer; }
        .mock-header { background: var(--primary); color: white; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
        .chart-container { max-width: 500px; margin: 0 auto; }
        canvas { max-width: 100%; height: auto; }
        .footer { text-align: center; padding: 1rem; background: var(--header-bg); color: white; margin-top: 2rem; font-size: 0.7rem; }
        .loader { text-align: center; padding: 2rem; color: var(--text-secondary); }
        @media (max-width: 600px) { .question-text { font-size: 0.9rem; } .info-bar { flex-direction: column; } .top-buttons { justify-content: center; } }
    </style>
    <!-- Chart.js for Performance Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

        <h1>🌿 अध्याय <span id="chapterNumDisplay">-</span> : भाग <span id="partNumDisplay">-</span></h1>

    const firebaseConfig = {
        apiKey: "AIzaSyCUKmZynkkDzwEuTALLK_dqSw950iEUTKU",
        authDomain: "environment-of-upsc-30e35.firebaseapp.com",
        projectId: "environment-of-upsc-30e35",
        storageBucket: "environment-of-upsc-30e35.firebasestorage.app",
        messagingSenderId: "304521196007",
        appId: "1:304521196007:web:51ab02f4e3240fd7e7cd42"
    };
    // ============================================================
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    
    let currentUser = null;
    let currentUserId = null;
    
    // DOM elements
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('userInfo');
    const userAvatar = document.getElementById('userAvatar');
    const userName = document.getElementById('userName');
    const loginPopup = document.getElementById('loginPopup');
    const googleSignInBtn = document.getElementById('googleSignInBtn');
    const skipLoginBtn = document.getElementById('skipLoginBtn');
    let skipLoginSelected = false;
    
    function showLoginModal() { if (!skipLoginSelected && !localStorage.getItem('skipLoginPermanently') && !currentUser) loginPopup.classList.remove('hidden'); }
    function closeLoginModal() { loginPopup.classList.add('hidden'); }
    function skipLogin() { skipLoginSelected = true; localStorage.setItem('skipLoginPermanently', 'true'); closeLoginModal(); }
    
    async function handleGoogleLogin() {
        try {
            const result = await signInWithPopup(auth, provider);
            console.log('Logged in:', result.user.displayName);
            updateUI(result.user);
            closeLoginModal();
            location.reload();
        } catch (error) {
            console.error('Login error:', error);
            if (error.code === 'auth/popup-blocked') alert('Popup blocked! Please allow popups.');
            else if (error.code === 'auth/unauthorized-domain') alert('Add dreamking627-png.github.io to Firebase Authorized domains.');
            else alert('Login failed: ' + error.message);
        }
    }
    
    async function handleLogout() {
        await signOut(auth);
        updateUI(null);
        localStorage.removeItem('skipLoginPermanently');
        skipLoginSelected = false;
        location.reload();
    }
    
    function updateUI(user) {
        if (user) {
            currentUser = user;
            currentUserId = user.uid;
            loginBtn.style.display = 'none';
            userInfo.style.display = 'flex';
            userAvatar.src = user.photoURL || 'https://via.placeholder.com/32';
            userName.textContent = user.displayName || user.email;
            localStorage.setItem('userId', user.uid);
        } else {
            currentUser = null;
            currentUserId = null;
            loginBtn.style.display = 'flex';
            userInfo.style.display = 'none';
            localStorage.removeItem('userId');
        }
    }
    
    onAuthStateChanged(auth, (user) => { updateUI(user); if (typeof loadCloudProgress === 'function') setTimeout(loadCloudProgress, 500); });
    
    loginBtn.onclick = () => { skipLoginSelected = false; showLoginModal(); };
    if (logoutBtn) logoutBtn.onclick = handleLogout;
    if (googleSignInBtn) googleSignInBtn.onclick = handleGoogleLogin;
    if (skipLoginBtn) skipLoginBtn.onclick = skipLogin;
    
    window.addEventListener('load', () => {
        if (!localStorage.getItem('skipLoginPermanently') && !currentUser && !skipLoginSelected) setTimeout(showLoginModal, 1500);
    });
    
    // Export for use in main script
    window.getCurrentUserId = () => currentUserId;
    window.isUserLoggedIn = () => currentUser !== null;
    window.db = db;
</script>

<script>
    // ============================================================
    // MAIN APPLICATION LOGIC
    // ============================================================
    let currentChapter = null, currentPart = null, questionsData = [], currentSearchTerm = '';
    let mockTestMode = false, mockQuestions = [], currentMockIndex = 0, mockScore = 0, mockTimer = null, timeLeft = 60;
    let userProgress = {}, userBookmarks = [];
    let progressChart = null;
    
    const container = document.getElementById('questionsContainer');
    const searchInput = document.getElementById('searchInput');
    const partSelect = document.getElementById('partSelect');
    const chapterNumDisplay = document.getElementById('chapterNumDisplay');
    const partNumDisplay = document.getElementById('partNumDisplay');
    
    // Dark Mode
    function initDarkMode() {
        const saved = localStorage.getItem('darkMode');
        const toggle = document.getElementById('darkModeToggle');
        if (saved === 'enabled') { document.body.classList.add('dark-mode'); toggle.textContent = '☀️'; }
        else { document.body.classList.remove('dark-mode'); toggle.textContent = '🌙'; }
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'enabled' : 'disabled');
            toggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        });
    }
    
    // Save to Firebase Cloud
    async function saveToCloud() {
        const userId = window.getCurrentUserId ? window.getCurrentUserId() : null;
        if (!userId) return;
        try {
            const progressRef = doc(window.db, 'users', userId);
            await setDoc(progressRef, {
                progress: userProgress,
                bookmarks: userBookmarks,
                lastUpdated: new Date().toISOString()
            }, { merge: true });
            console.log('Saved to cloud');
        } catch(e) { console.error('Cloud save error:', e); }
    }
    
    // Load from Firebase Cloud
    async function loadCloudProgress() {
        const userId = window.getCurrentUserId ? window.getCurrentUserId() : null;
        if (!userId) { userProgress = {}; userBookmarks = []; renderQuestions(); return; }
        try {
            const progressRef = doc(window.db, 'users', userId);
            const docSnap = await getDoc(progressRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                userProgress = data.progress || {};
                userBookmarks = data.bookmarks || [];
                console.log('Loaded from cloud');
            } else {
                userProgress = {};
                userBookmarks = [];
            }
            renderQuestions();
        } catch(e) { console.error('Cloud load error:', e); userProgress = {}; renderQuestions(); }
    }
    window.loadCloudProgress = loadCloudProgress;
    
    // Save local progress and sync to cloud
    function saveProgress(questionId, isCorrect) {
        if (!userProgress[currentChapter]) userProgress[currentChapter] = {};
        if (!userProgress[currentChapter][currentPart]) userProgress[currentChapter][currentPart] = {};
        userProgress[currentChapter][currentPart][questionId] = isCorrect;
        saveToCloud();
    }
    
    function toggleBookmark(questionId) {
        const index = userBookmarks.indexOf(questionId);
        if (index === -1) userBookmarks.push(questionId);
        else userBookmarks.splice(index, 1);
        saveToCloud();
        renderQuestions();
    }
    
    async function loadQuestions() {
        const urlParams = new URLSearchParams(window.location.search);
        const chapter = urlParams.get('chapter');
        const part = urlParams.get('part');
        if (!chapter || !part) { container.innerHTML = '<div class="loader">❌ URL में ?chapter=7&part=1 डालें</div>'; return; }
        currentChapter = parseInt(chapter);
        currentPart = parseInt(part);
        chapterNumDisplay.textContent = currentChapter;
        partNumDisplay.textContent = currentPart;
        partSelect.value = currentPart;
        document.getElementById('backToChapterLink').href = `chapter-${currentChapter}/index.html`;
        try {
            const response = await fetch(`chapter-${currentChapter}/part-${currentPart}.json`);
            if (!response.ok) throw new Error();
            questionsData = await response.json();
            renderQuestions();
        } catch(err) { container.innerHTML = '<div class="loader">❌ प्रश्न लोड नहीं हुए। JSON फ़ाइल मौजूद नहीं है।</div>'; }
    }
    
    function renderQuestions() {
        let filtered = questionsData;
        if (currentSearchTerm.trim()) {
            const term = currentSearchTerm.toLowerCase();
            filtered = questionsData.filter(q => q.text.toLowerCase().includes(term) || q.analysis.toLowerCase().includes(term));
        }
        if (filtered.length === 0) { container.innerHTML = '<div class="loader">🔍 कोई प्रश्न नहीं मिला</div>'; return; }
        
        const chapterProgress = userProgress[currentChapter]?.[currentPart] || {};
        
        container.innerHTML = filtered.map(q => `
            <div class="question-card ${userBookmarks.includes(q.id) ? 'bookmarked' : ''}" data-id="${q.id}" data-correct="${q.correctAnswer}">
                <div class="question-text">${q.id}. ${q.text}</div>
                <div class="question-meta">
                    <span>📖 ${q.exam || 'UPSC/State PSC'}</span>
                    ${chapterProgress[q.id] ? '<span style="color:#4caf50;">✓ उत्तर दिया</span>' : ''}
                </div>
                <div class="options" id="options-${q.id}">
                    ${Object.entries(q.options).map(([k, v]) => `<div class="option" data-choice="${k}">(${k.toUpperCase()}) ${v}</div>`).join('')}
                </div>
                <div id="analysis-${q.id}" class="analysis-box"></div>
                <div class="btn-group">
                    <button class="btn-bookmark ${userBookmarks.includes(q.id) ? 'active' : ''}" onclick="toggleBookmark(${q.id})">${userBookmarks.includes(q.id) ? '⭐ बुकमार्क हटाएं' : '🔖 बुकमार्क करें'}</button>
                    <button class="btn-image" onclick="searchImage('${q.imageQuery.replace(/'/g, "\\'")} upsc')">🖼️ Google Image Search</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.removeEventListener('click', optionClickHandler);
            opt.addEventListener('click', optionClickHandler);
        });
        
        // Apply saved correct answers visual
        for (const [qid, isCorrect] of Object.entries(chapterProgress)) {
            if (isCorrect) {
                const qCard = document.querySelector(`.question-card[data-id="${qid}"]`);
                if (qCard) qCard.style.borderLeft = '4px solid #4caf50';
            }
        }
    }
    
    function optionClickHandler(event) {
        if (mockTestMode) return;
        const opt = event.currentTarget;
        const qCard = opt.closest('.question-card');
        const qid = parseInt(qCard.dataset.id);
        const correctKey = qCard.dataset.correct;
        const selected = opt.dataset.choice;
        const question = questionsData.find(q => q.id === qid);
        if (!question) return;
        
        qCard.querySelectorAll('.option').forEach(o => o.classList.remove('correct-highlight', 'wrong-highlight'));
        const isCorrect = (selected === correctKey);
        if (isCorrect) opt.classList.add('correct-highlight');
        else opt.classList.add('wrong-highlight');
        
        const analysisDiv = document.getElementById(`analysis-${qid}`);
        analysisDiv.innerHTML = `<strong>✅ सही उत्तर: (${correctKey.toUpperCase()}) ${question.options[correctKey]}</strong><br><br><strong>📘 विश्लेषण:</strong> ${question.analysis}`;
        analysisDiv.style.display = 'block';
        
        if (isCorrect) {
            saveProgress(qid, true);
            qCard.style.borderLeft = '4px solid #4caf50';
        }
    }
    
    function searchImage(query) { if (!query) { alert('कोई छवि खोज क्वेरी नहीं'); return; } window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}&tbm=isch`, '_blank'); }
    window.toggleBookmark = toggleBookmark;
    window.searchImage = searchImage;
    
    // Mock Test Functions
    function startMockTest() {
        if (!questionsData.length) { alert('प्रश्न लोड नहीं हुए'); return; }
        const shuffled = [...questionsData];
        for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        mockQuestions = shuffled.slice(0, 10);
        mockTestMode = true;
        currentMockIndex = 0;
        mockScore = 0;
        timeLeft = 60;
        showMockQuestion();
        startMockTimer();
    }
    
    function startMockTimer() {
        if (mockTimer) clearInterval(mockTimer);
        mockTimer = setInterval(() => {
            if (timeLeft <= 0) { clearInterval(mockTimer); endMockTest(); }
            else { timeLeft--; const timerDiv = document.getElementById('mockTimer'); if (timerDiv) timerDiv.textContent = `⏱️ ${timeLeft}s`; }
        }, 1000);
    }
    
    function showMockQuestion() {
        if (currentMockIndex >= mockQuestions.length) { endMockTest(); return; }
        const q = mockQuestions[currentMockIndex];
        container.innerHTML = `
            <div class="mock-header">
                <span>📝 प्रश्न ${currentMockIndex+1}/${mockQuestions.length}</span>
                <span>⭐ स्कोर: ${mockScore}</span>
                <span id="mockTimer">⏱️ ${timeLeft}s</span>
            </div>
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="options">
                    ${Object.entries(q.options).map(([k, v]) => `<div class="option" onclick="checkMockAnswer('${k}')">(${k.toUpperCase()}) ${v}</div>`).join('')}
                </div>
            </div>
            <button onclick="endMockTest()" style="margin-top:10px; padding:5px 15px;">❌ मॉक टेस्ट रद्द करें</button>
        `;
    }
    
    window.checkMockAnswer = function(selected) {
        const currentQ = mockQuestions[currentMockIndex];
        if (selected === currentQ.correctAnswer) mockScore++;
        currentMockIndex++;
        showMockQuestion();
    };
    
    function endMockTest() {
        clearInterval(mockTimer);
        mockTestMode = false;
        const percent = Math.round((mockScore / mockQuestions.length) * 100);
        alert(`मॉक टेस्ट समाप्त!\nस्कोर: ${mockScore}/${mockQuestions.length}\nप्रतिशत: ${percent}%`);
        renderQuestions();
    }
    
    // Performance Dashboard
    async function showPerformance() {
        const userId = window.getCurrentUserId ? window.getCurrentUserId() : null;
        if (!userId) { alert('कृपया पहले लॉगिन करें'); return; }
        
        let totalCorrect = 0, totalQuestions = 0;
        for (const chapter in userProgress) {
            for (const part in userProgress[chapter]) {
                for (const qid in userProgress[chapter][part]) {
                    if (userProgress[chapter][part][qid] === true) totalCorrect++;
                    totalQuestions++;
                }
            }
        }
        const percentage = totalQuestions > 0 ? (totalCorrect / totalQuestions) * 100 : 0;
        
        document.getElementById('performanceModal').style.display = 'flex';
        const ctx = document.getElementById('progressChart').getContext('2d');
        if (progressChart) progressChart.destroy();
        progressChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['सही उत्तर', 'गलत / अनुत्तरित'], datasets: [{ data: [totalCorrect, totalQuestions - totalCorrect], backgroundColor: ['#4caf50', '#ef4444'] }] },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }
    function closePerformanceModal() { document.getElementById('performanceModal').style.display = 'none'; }
    
    function initSearch() { searchInput.addEventListener('input', (e) => { currentSearchTerm = e.target.value; renderQuestions(); }); }
    function initPartSelector() { partSelect.addEventListener('change', (e) => { window.location.href = `viewer.html?chapter=${currentChapter}&part=${e.target.value}`; }); }
    
    document.getElementById('mockTestBtn').onclick = startMockTest;
    document.getElementById('performanceBtn').onclick = showPerformance;
    window.closePerformanceModal = closePerformanceModal;
    window.endMockTest = endMockTest;
    
    initDarkMode();
    initSearch();
    initPartSelector();
    loadQuestions();
</script>
</body>
